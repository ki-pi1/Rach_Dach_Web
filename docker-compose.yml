services:
  web:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`rs-bau.cloud`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "traefik.docker.network=rach_dach_web_default"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - rach_dach_web_default
networks:
    rach_dach_web_default:
      external: true

